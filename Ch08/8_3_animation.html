<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>8-3</title>
    <style>
        .box {
            position: relative;
            width: 800px;
            height: 500px;
            border: 1px solid black;
        }

        .box > div {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 1px solid black;
            background: orange;
            box-sizing: border-box;
        }

        .box > div:nth-child(1) {left: 0; top:  10px;}
        .box > div:nth-child(2) {left: 0; top: 120px;}
        .box > div:nth-child(3) {left: 0; top: 230px;}
        .box > div:nth-child(4) {left: 0; top: 340px;}

    </style>
</head>
<body>
    <h3>8-3.애니메이션 옵션</h3>
    <div class="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>
    
</body>
</html>
